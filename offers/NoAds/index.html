<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Ads Popup</title>

<style>
@font-face {
  font-family: Fedoka;
  src: url(../../Fredoka-Medium.ttf);
}

body{
    margin:0;
    font-family: Fedoka;
    background:#e6e6e6;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.popup{
    width:340px;
    border-radius:20px;
    background:linear-gradient(180deg,#6b5cff,#5a43c6);
    color:white;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    overflow:hidden;
    padding-bottom: 80px;
    border-color: #362b2b;
    border-width: 2px;
    border-style: solid;
}

.popup-header{
    background:linear-gradient(180deg,#ff8a5a,#e0553a);
    padding:16px;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
}

.popup-content{
    padding:35px 25px 30px 25px;
}

.ads-icon{
}

.desc{
    font-size:16px;
    line-height:1.5;
    margin-bottom:30px;
}

.remove-btn{
    background:linear-gradient(180deg,#ffc64d,#f0a71e);
    border:none;
    padding:14px 30px;
    border-radius:14px;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    color:#fff;
    font-family: Fedoka;
    border-color: #362b2b;
    border-width: 2px;
    border-style: solid;
}

.remove-btn span {
    text-shadow: 2px 2px 0px #362b2b;
}

.remove-btn:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #c98713;
}

.not-now{
    display:none;
    margin-top:18px;
    color:#e6e6ff;
    cursor:pointer;
    font-weight:600;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div id="popup" class="popup">
    
    <div class="popup-header">
        NO MORE ADS!
    </div>

    <div class="popup-content">
        <img src="../../no_ads.png" class="ads-icon" width="60%" height="60%"></div>

        <div class="desc">
            Remove all pop-up ads.<br>
            Keep optional ads for rewards.
        </div>

        <button class="remove-btn" onclick="removeAds()">
            <span>REMOVE ADS</span>
        </button>

        <span id="not-now-btn" class="not-now" onclick="closePopup()">
            Not now
        </span>
    </div>

</div>

<script>
function removeAds(){
    window.location = "uniwebview://purchase";
}

function closePopup(){
    window.location = "uniwebview://close";
}

function setCloseDelay(value) {
  setTimeout(function() {
    document.getElementById("not-now-btn").style.display = "block";
    document.getElementById("popup").style.paddingBottom = "44px";
  }, parseInt(value) * 1000);
}

</script>

</body>
</html>
