<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Ads Popup</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap");

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Open Sans", Arial, sans-serif;
  background: #4a21bf;
  -webkit-tap-highlight-color: transparent;
}

.popup,
.popup * {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

button,
img {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-user-drag: none;
}

button:focus,
button:focus-visible,
button:active {
  outline: none;
  box-shadow: none;
}

.popup {
  position: fixed;
  inset: 0;
  color: #ffffff;
  background: linear-gradient(180deg, #6433d6 0%, #a748ed 37%, #ff8a7d 55%, #a63cf0 74%, #5b2ad5 100%);
}

.popup::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("images/background.png") center center / cover no-repeat;
}

.screen {
  position: relative;
  z-index: 1;
  width: min(100vw, calc(100vh * 739 / 1600));
  max-width: 739px;
  height: 100%;
  margin: 0 auto;
  padding: calc(env(safe-area-inset-top) + clamp(16px, 3.6vh, 48px)) clamp(18px, 5vw, 48px) calc(env(safe-area-inset-bottom) + clamp(20px, 4.5vh, 76px));
  box-sizing: border-box;
}

.close-btn {
  position: absolute;
  top: calc(env(safe-area-inset-top) + clamp(20px, 5.6vh, 86px));
  right: clamp(8px, 3.2vw, 24px);
  z-index: 3;
  border: 0;
  padding: 0;
  margin: 0;
  background: transparent;
  color: #9f85ff;
  font-family: "Open Sans", Arial, sans-serif;
  font-size: clamp(42px, 7.6vw, 78px);
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  opacity: 1;
  pointer-events: auto;
  transition: opacity 0.2s ease;
}

.content {
  margin-top: clamp(58px, 14.6vh, 235px);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.title {
  margin: 0;
  font-size: clamp(48px, 9.2vw, 88px);
  font-weight: 800;
  letter-spacing: 0.01em;
  line-height: 0.96;
  -webkit-text-stroke: clamp(1px, 0.35vw, 4px) #2f0f6c;
  text-shadow: 0.035em 0.045em 0 #2f0f6c;
}

.title-accent {
  color: #ff7f4f;
}

.desc {
  margin: clamp(14px, 2.6vh, 28px) 0 0;
  font-size: clamp(20px, 3.5vw, 34px);
  font-weight: 500;
  line-height: 1.18;
  font-family: "Open Sans", Arial, sans-serif;
}

.desc span {
  display: block;
}

.desc-main {
  color: #f9ff39;
  margin-bottom: 4px;
}

.offer-block {
  position: absolute;
  left: 50%;
  bottom: calc(env(safe-area-inset-bottom) + clamp(26px, 11.2vh, 220px));
  transform: translateX(-50%);
  width: min(68%, 500px);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.offer-top {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
  margin-bottom: 2px;
}

.old-price {
  position: relative;
  display: inline-block;
  font-size: clamp(26px, 3.8vw, 62px);
  font-weight: 800;
  line-height: 1;
  color: #ffd7ff;
  -webkit-text-stroke: clamp(1px, 0.2vw, 2px) #a732c9;
  text-shadow: 0.03em 0.05em 0 #7727a7;
  font-family: "Open Sans", Arial, sans-serif;
}

.old-price::after {
  content: "";
  position: absolute;
  left: -2%;
  right: -2%;
  top: 50%;
  height: clamp(4px, 0.85vw, 7px);
  border-radius: 999px;
  background: #f7e0ff;
  transform: rotate(-6deg);
}

.sale-badge {
  position: absolute;
  right: -14px;
  top: -8px;
  width: 78px;
  height: 36px;
  margin: 0px;
  padding: 0px;
  text-align: center;
  vertical-align: middle;
  transform: translateY(-26%);
  border-radius: clamp(14px, 2.8vw, 24px);
  background: #FA242D;
  color: #ffffff;
  font-size: 26px;
  font-weight: 800;
  line-height: 38px;
  box-shadow: 0 4px 0 #8b1818;
  text-shadow: 0.03em 0.04em 0 rgba(120, 0, 0, 0.65);
  font-family: "Open Sans", Arial, sans-serif;
}

.remove-btn {
  position: relative;
  width: 80%;
  border: 0;
  padding: 0;
  margin: 0;
  background: transparent;
  cursor: pointer;
}

.remove-btn img {
  width: 100%;
  height: auto;
  display: block;
}

.remove-btn span {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: clamp(26px, 9vw, 64px);
  font-weight: 800;
  color: #fff;
  text-shadow: 0.03em 0.04em 0 #3d7f1a;
  font-family: "Open Sans", Arial, sans-serif;
  padding-bottom: 4px;
  -webkit-text-stroke: clamp(1px, 0.18vw, 2px) #2E8100;
}

.offer-timer {
  margin: clamp(18px, 1.2vh, 34px) 0 0;
  font-size: clamp(12px, 5vw, 58px);
  font-weight: 800;
  line-height: 1;
  color: #f4f0ff;
  -webkit-text-stroke: clamp(1px, 0.18vw, 2px) #4b148f;
  text-shadow: 0.03em 0.04em 0 #4b148f;
}

#offer-countdown {
  font-variant-numeric: tabular-nums;
}

.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(8, 10, 30, 1);
  opacity: 1;
  transition: opacity 0.45s ease;
}

.loading-spinner {
  width: 56px;
  height: 56px;
  border: 5px solid rgba(255, 255, 255, 0.22);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.85s linear infinite;
}

body.is-content-ready .loading-overlay {
  opacity: 0;
  pointer-events: none;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>
</head>

<body>
<div class="loading-overlay" data-loading-overlay>
  <div class="loading-spinner" aria-label="Loading" role="status"></div>
</div>

<div id="popup" class="popup">
  <div class="screen">
    <button id="not-now-btn" class="close-btn" onclick="closePopup()" aria-label="Close popup">&times;</button>

    <div class="content">
      <h1 class="title">NO MORE <span class="title-accent">ADS</span></h1>

      <div class="desc">
        <span class="desc-main">Remove all pop-up ads.</span>
        <span>Keep optional ads for rewards.</span>
      </div>
    </div>

    <div class="offer-block">
      <div class="offer-top">
        <span class="old-price">$12.00</span>
      </div>

      <button class="remove-btn" onclick="removeAds()" aria-label="Remove ads for $5.99">
        <img src="images/button.png" alt="">
        <span>$5.99</span>
        <p class="sale-badge">-50%</p>
      </button>

      <p class="offer-timer">Time left: <span id="offer-countdown">15:26:21</span></p>
    </div>
  </div>
</div>

<script>
function removeAds(){
    window.location = "uniwebview://purchase";
}

function closePopup(){
    window.location = "uniwebview://close";
}

function setCloseDelay(value) {
  var delay = parseInt(value, 10);
  if (isNaN(delay) || delay < 0) {
    delay = 0;
  }

  setTimeout(function() {
    var closeBtn = document.getElementById("not-now-btn");
    if (closeBtn) {
      closeBtn.style.opacity = "1";
      closeBtn.style.pointerEvents = "auto";
    }
  }, delay * 1000);
}

var OFFER_TIMER_DEFAULT_SECONDS = 3 * 60;
var offerTimerRemaining = OFFER_TIMER_DEFAULT_SECONDS;
var offerTimerId = null;
var offerTimerExpired = false;

function formatOfferTimer(seconds) {
  var total = Math.max(0, seconds | 0);
  var hours = Math.floor(total / 3600);
  var minutes = Math.floor((total % 3600) / 60);
  var secs = total % 60;

  return String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
}

function updateOfferTimerText() {
  var countdown = document.getElementById("offer-countdown");
  if (!countdown) {
    return;
  }

  countdown.textContent = formatOfferTimer(offerTimerRemaining);
}

function handleOfferTimerExpired() {
  if (offerTimerExpired) {
    return;
  }

  offerTimerExpired = true;
  if (offerTimerId) {
    clearInterval(offerTimerId);
    offerTimerId = null;
  }
  updateOfferTimerText();
  closePopup();
}

function startOfferTimer() {
  updateOfferTimerText();

  if (offerTimerId) {
    clearInterval(offerTimerId);
    offerTimerId = null;
  }

  if (offerTimerRemaining <= 0) {
    handleOfferTimerExpired();
    return;
  }

  offerTimerId = setInterval(function() {
    if (offerTimerRemaining <= 0) {
      handleOfferTimerExpired();
      return;
    }

    offerTimerRemaining -= 1;
    updateOfferTimerText();

    if (offerTimerRemaining <= 0) {
      handleOfferTimerExpired();
    }
  }, 1000);
}

var loader = {
  readyClass: "is-content-ready",
  selector: "[data-loading-overlay]",
  isHidden: false
};

function hideLoadingOverlay() {
  if (loader.isHidden) {
    return;
  }

  loader.isHidden = true;
  document.body.classList.add(loader.readyClass);

  var overlay = document.querySelector(loader.selector);
  if (!overlay) {
    return;
  }

  function removeOverlay() {
    overlay.remove();
  }

  overlay.addEventListener("transitionend", removeOverlay, { once: true });
  window.setTimeout(removeOverlay, 650);
}

function initLoadingOverlay() {
  if (document.readyState === "complete") {
    window.requestAnimationFrame(hideLoadingOverlay);
    return;
  }

  window.addEventListener("load", hideLoadingOverlay, { once: true });
  window.setTimeout(hideLoadingOverlay, 5000);
}

initLoadingOverlay();
startOfferTimer();

</script>

</body>
</html>
