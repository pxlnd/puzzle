<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <title>VIP Membership</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Open Sans', Arial, sans-serif;
}

body {
  background-image: url("Sprites/bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  text-align: center;
  position: relative;
}

/* Close button */
.close-btn {
  position: absolute;
  right: 32px;
  top: 32px;
  font-size: 22px;
  border: none;
  font-weight: bold;
  background: transparent;
}

.close-btn img {
  width: 40px;
}

/* Header */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.header h1 {
  font-size: 32px;
  color: gold;
  line-height: 1.1;
}

.header-image {
  width: min(90vw, 600px);
}

.subtitle {
  margin: -36px 0 16px;
  font-size: 16px;
  opacity: 0.8;
  color: #fff;
}

/* Card */
.card {
  background: linear-gradient(180deg, #2a2f6b, #1c2250);
  border-radius: 16px;
  padding: 15px;
}

.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 2px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.item:last-child {
  border-bottom: none;
}

.item img {
  width: 48px;
}

.item span {
  font-size: 15px;
  font-weight: 600;
}

/* Trial */
.trial {
  margin: 16px 0px 10px 0px;
  position: relative;
}

.trial img {
    position: absolute;
    width: 100%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    z-index: -1;
}

.trial span {
  display: block;
  padding: 8px;
  font-weight: 800;
  font-size: 22px;
  -webkit-text-stroke: 1px #072E8C;
}

.trial p {
  margin-top: 8px;
  font-size: 14px;
}

.trial strong {
    color: #BD9B2B;
}

/* Subscribe button */
.subscribe-btn {
  position: relative;
  border: none;
  background: none;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

.subscribe-btn img {
  width: 100%;
  border-radius: 50px;
}

.subscribe-btn span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -88%);
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(180deg, #FEFEED, #FDE50F);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  -webkit-text-stroke: 1px #336105;
}

/* Footer */
.footer {
  margin-top: 10px;
  font-size: 12px;
  display: flex;
  justify-content: space-around;
  opacity: 0.8;
}

.footer a {
  color: white;
  text-decoration: none;
}

/* Note */
.note {
  margin-top: 4px;
  font-size: 11px;
  opacity: 0.6;
  color: #d4d4d4;
}

.footer-button {
    background: transparent;
    border: none;
    color: #d4d4d4;
}

.footer span {
    color: #d4d4d4;
}

/* Tablet */
@media (min-width: 768px) {
  .container {
    max-width: 600px;
  }

  .header h1 {
    font-size: 42px;
  }

  .item span {
    font-size: 18px;
  }
}
  </style>
</head>
<body>

<div class="container">

  <!-- Close button -->
  <button class="close-btn" onclick="closePopup()"><img src="Sprites/close.png" /></button>

  <!-- Header -->
  <div class="header">
    <img src="Sprites/vip.png" class="header-image" />
  </div>

  <p class="subtitle">Unlimited puzzles & exclusive rewards</p>

  <!-- Features -->
  <div class="card">
    <div class="item">
      <img src="Sprites/ads.png" />
      <span>No Ads</span>
    </div>
    <div class="item">
      <img src="Sprites/heart.png" />
      <span>Infinite hearts</span>
    </div>
    <div class="item">
      <img src="Sprites/booster.png" />
      <span>5 Boosters Every Day</span>
    </div>
    <div class="item">
      <img src="Sprites/puzzle.png" />
      <span>Unique Premium Levels</span>
    </div>
    <div class="item">
      <img src="Sprites/calendar.png" />
      <span>Early Access to New Content</span>
    </div>
    <div class="item">
      <img src="Sprites/present.png" />
      <span>Extra Rewards & Bonuses</span>
    </div>
  </div>

  <!-- Trial Banner -->
  <div class="trial">
    <img src="Sprites/stripe.png" alt="">
    <span>FREE 3 DAYS TRIAL</span>
    <p>Then <strong>$4.99</strong> / month</p>
  </div>

  <!-- Subscribe Button (image + text) -->
  <button class="subscribe-btn">
    <img src="Sprites/btn.png" />
    <span>SUBSCRIBE</span>
  </button>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-button">Restore Purchases</button>
    <span>|</span>
    <button class="footer-button">Terms of Use</button>
    <span>|</span>
    <button class="footer-button">Privacy Policy</button>
  </div>

  <p class="note">
    All subscriptions will automatically renew unless they are canceled
  </p>

</div>

<script>

function closePopup(){
    window.location = "uniwebview://close";
}

</script>

</body>
</html>
