<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Ads Offer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #faf9f6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .offer-container {
      background: #fff;
      padding: 2em 3em;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 350px;
      text-align: center;
    }
    .offer-title {
      font-size: 2rem;
      color: #333;
      margin-bottom: 0.5em;
    }
    .offer-desc {
      color: #666;
      font-size: 1.12rem;
      margin-bottom: 1.5em;
    }
    .offer-price {
      font-size: 1.8rem;
      color: #3a9f57;
      font-weight: bold;
      margin-bottom: 2em;
    }
    .buy-btn {
      background: linear-gradient(90deg,#36c466,#27b3a0);
      color: #fff;
      padding: 0.9em 2em;
      border: none;
      border-radius: 46px;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      margin-bottom: 1em;
      box-shadow: 0 2px 8px rgba(58,159,87,0.15);
      transition: background 0.2s;
    }
    .buy-btn:hover {
      background: linear-gradient(90deg,#27b3a0,#36c466);
    }
    .smallprint {
      color: #999;
      font-size: 0.92em;
      margin-top: 1.3em;
    }
  </style>
</head>
<body>
  <div class="offer-container">
    <div class="offer-title">No Ads!</div>
    <div class="offer-desc">
      Enjoy uninterrupted play.<br>
      Purchase this offer to remove all ads from the game experience.
    </div>
    <div class="offer-price">$2.99</div>
    <button class="buy-btn" id="buy-now-btn">Buy Now</button>
    <div class="smallprint">One-time purchase. Ads will be permanently removed.</div>
  </div>
  <script>
    document.getElementById('buy-now-btn').onclick = function() {
      alert('Thank you for choosing to remove ads! (Payment flow not implemented in this demo.)');
    }
  </script>
</body>
</html>
